# Tiny Tapeout project information
project:
  title:        "Memoryless Streaming GPU Rasterizer"      # Project title
  author:       "Abhimanyu. M, Busiraju Aniruddha Kashyap, Dhruv John Sebastian, Dr. Sudhanya. P"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A hardware-accelerated real-time triangle rasterization core utilizing parallel Pineda edge cross-product execution arrays."      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     100000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_gpu_rasterizer"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "X_COORD_0"
  ui[1]: "X_COORD_1"
  ui[2]: "X_COORD_2"
  ui[3]: "X_COORD_3"
  ui[4]: "Y_COORD_0"
  ui[5]: "Y_COORD_1"
  ui[6]: "Y_COORD_2_OR_SHADER_MODE_1"
  ui[7]: "CONTROL_LATCH_HANDSHAKE"

  # Outputs
  uo[0]: "COLOR_B_0"
  uo[1]: "COLOR_B_1"
  uo[2]: "COLOR_G_0"
  uo[3]: "COLOR_G_1"
  uo[4]: "COLOR_R_0"
  uo[5]: "COLOR_R_1"
  uo[6]: "SCANNER_DONE_FLAG"
  uo[7]: "RENDER_VALID_FLAG"

  # Bidirectional pins
  uio[0]: "UNUSED"
  uio[1]: "UNUSED"
  uio[2]: "UNUSED"
  uio[3]: "UNUSED"
  uio[4]: "UNUSED"
  uio[5]: "UNUSED"
  uio[6]: "UNUSED"
  uio[7]: "UNUSED"

# Do not change!
yaml_version: 6
